name: CI/CD Pipeline - Back Despachos

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y subir imagen a Docker Hub
        uses: docker/build-push-action@v4
        with:
          # Le indicamos la ruta exacta donde vive el Dockerfile de Despachos
          context: ./Springboot-API-REST-DESPACHO
          file: ./Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: marcelo1993/back-despachos:latest
          